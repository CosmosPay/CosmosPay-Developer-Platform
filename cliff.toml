# git-cliff configuration — builds the changelog from Conventional Commits.
# Used by .github/workflows/release.yml to fill the GitHub Release body and to
# maintain CHANGELOG.md on the default branch.
# Docs: https://git-cliff.org/docs/configuration
[changelog]
header = """
# Changelog

All notable changes to the Cosmos Pay Developer Platform are documented here.
Generated from [Conventional Commits](https://www.conventionalcommits.org) by [git-cliff](https://git-cliff.org).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}\
        - {{ commit.message | split(pat="\n") | first | upper_first }}\
          {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
    {% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
filter_commits = false
tag_pattern = 'v[0-9]+\.[0-9]+\.[0-9]+$'
ignore_tags = '.*-dev.*'
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^style", group = "<!-- 5 -->Styling" },
  { message = "^test", group = "<!-- 6 -->Testing" },
  { message = "^build", group = "<!-- 7 -->Build System" },
  { message = "^ci", group = "<!-- 8 -->CI/CD" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "<!-- 9 -->Dependencies" },
  { message = "^Bump ", group = "<!-- 9 -->Dependencies" },
  { message = "^chore", group = "<!-- 10 -->Miscellaneous" },
  { message = ".*", group = "<!-- 10 -->Miscellaneous" },
]
