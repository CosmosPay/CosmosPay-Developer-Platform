# Automatic dependency updates. Dependabot opens weekly PRs to keep dependencies on
# their latest versions and raises security PRs when a fix ships for a known
# vulnerability. Every PR runs CI, so nothing lands unless the build stays green.
version: 2
updates:
  # npm dependencies for the Astro portal (root package).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels: ['dependencies']
    commit-message:
      prefix: chore # non-feat/fix -> patch bump in the release workflow
    groups:
      # One PR for all non-breaking updates to cut noise; majors stay separate.
      minor-and-patch:
        update-types: [minor, patch]

  # npm dependencies for the nested Fumadocs (Next.js) docs subproject.
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels: ['dependencies', 'docs']
    commit-message:
      prefix: chore
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Keep the GitHub Actions used by the workflows on their latest versions too.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ['ci']
    commit-message:
      prefix: chore
