name: CI

# Build on every push and pull request. `npm run build` runs prisma generate, builds
# the nested Fumadocs (Next.js) docs subproject (build-docs.mjs installs its deps on a
# fresh checkout), then the Astro SSR build — so a green build exercises the whole app.
on:
  push:
    branches: [main, fumadocs]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # prisma generate + Fumadocs docs export + Astro SSR build (dist/).
      - name: Build
        run: npm run build
        env:
          # astro:env validates PUBLIC_ (client) vars at build time — they're inlined into
          # the client bundle. Any valid URL satisfies the compile check; the real value is
          # injected at deploy. Set a repo Variable to override the default.
          PUBLIC_BETTER_AUTH_URL: ${{ vars.PUBLIC_BETTER_AUTH_URL || 'https://dev.cosmospay.lat' }}
          # prisma.config.ts resolves env('DATABASE_URL') at load time. `prisma generate`
          # only does codegen (no DB connection), so a dummy URL is enough for CI.
          DATABASE_URL: ${{ vars.DATABASE_URL || 'postgresql://user:pass@localhost:5432/db' }}
